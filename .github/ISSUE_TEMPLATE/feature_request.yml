name: Feature request
description: Propose a new capability or change for fc-sandbox-sdk
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? Why does it matter?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / solution
      description: Sketch the API or behavior you have in mind. Code is welcome.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated, and why they fall short.
    validations:
      required: false
