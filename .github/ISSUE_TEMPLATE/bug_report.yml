name: Bug report
description: Report a defect in fc-sandbox-sdk
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in the fields below.
        Do not include API keys, tokens, or other secrets.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal code snippet that reproduces the issue.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What you expected to happen, and what actually happened.
    validations:
      required: true
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: The `fc-sandbox-sdk` version (e.g. 0.3.0).
    validations:
      required: true
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Node
        - Bun
        - Deno
        - Edge / other
    validations:
      required: true
  - type: input
    id: runtime-version
    attributes:
      label: Runtime version
      description: e.g. Node 20.11, Bun 1.1.30, Deno 1.46.
    validations:
      required: true
  - type: checkboxes
    id: no-secrets
    attributes:
      label: Confirmation
      options:
        - label: This report contains no API keys, tokens, or other secrets.
          required: true
