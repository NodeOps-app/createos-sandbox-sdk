name: examples

# Runs every example end-to-end against the live createos-sandbox control plane.
# Each example is a one-shot `bun index.ts` that creates a sandbox, verifies
# it, and destroys it in a `finally` block — so a green job means the example
# worked against production.
#
# Cost note: every run spawns real VMs and makes paid LLM API calls.
# Triggers are kept deliberate: nightly, manual, and on push to main.
#
# No `pull_request` trigger by design. Examples run arbitrary `bun index.ts`
# with real provider secrets on a self-hosted runner; firing that on PRs
# would let any fork PR exfiltrate those secrets. Examples are verified on
# push to main (post-merge) instead.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *" # nightly 03:17 UTC
  push:
    branches: [main]
    paths:
      - "src/**"
      - "examples/**"
      - ".github/workflows/examples.yml"

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # checkout only; no write scope needed

jobs:
  # Build the example matrix from the examples/ directory so new examples are
  # picked up automatically — no edits to this file when one is added.
  # Discover also builds the SDK and installs example deps ONCE, seeding a
  # shared cache. The matrix jobs restore dist/ + examples/node_modules from
  # it instead of repeating `bun install` + `bun run build` 37 times.
  discover:
    runs-on: arc-runner-set
    outputs:
      examples: ${{ steps.list.outputs.examples }}
      cache-key: ${{ steps.key.outputs.key }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: list
        run: |
          json=$(cd examples && for d in [0-9]*/; do printf '%s\n' "${d%/}"; done \
            | grep . | grep -vE '^(10|36|37)-' | sed 's/.*/"&"/' | paste -sd, -)
          echo "examples=[$json]" >> "$GITHUB_OUTPUT"

      # Single source of truth for the cache key, consumed by the matrix jobs.
      # dist/ depends on src + tsconfig; examples/node_modules on its lockfile.
      - id: key
        run: |
          echo "key=examples-deps-${{ hashFiles('src/**', 'tsconfig.json', 'bun.lock', 'examples/bun.lock', 'examples/package.json') }}" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      # We cache the global bun store, NOT node_modules: examples depend on the
      # SDK via `file:../`, which bun materializes as a symlink back to the repo
      # root — a cycle that makes node_modules un-tar-able. The global store is
      # content-addressed and flat. Derive its path rather than hardcoding it.
      - id: buncache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      - id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.buncache.outputs.dir }}
            dist
          key: ${{ steps.key.outputs.key }}

      # On a cache miss, warm the global store (root + example deps) and build
      # dist/. cache@ saves both in its post step when the key was absent.
      - name: Build SDK + warm dependency cache
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          bun install
          bun run build
          cd examples && bun install

  run:
    needs: discover
    runs-on: arc-runner-set
    # 5 concurrent waves × 20 min per example = up to 90 min worst-case
    timeout-minutes: 90
    env:
      EXAMPLES_JSON: ${{ needs.discover.outputs.examples }}
      # createos-sandbox control plane (read by the SDK + most examples)
      CREATEOS_SANDBOX_API_KEY: ${{ secrets.CREATEOS_SANDBOX_API_KEY }}
      CREATEOS_SANDBOX_BASE_URL: ${{ secrets.CREATEOS_SANDBOX_BASE_URL }}
      # OpenAI / OpenAI-compatible
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_API_URL: ${{ secrets.OPENAI_API_URL }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      # Anthropic
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
      ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      # S3-compatible bucket (example 38)
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_USE_PATH_STYLE: ${{ secrets.S3_USE_PATH_STYLE }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - id: buncache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      # Restore the global bun store + dist/ seeded by discover. node_modules is
      # NOT cached (the file:../ SDK symlink cycles); we relink it below with a
      # warm install that hits the restored store instead of the network.
      - id: cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.buncache.outputs.dir }}
            dist
          key: ${{ needs.discover.outputs.cache-key }}

      # Rebuild dist/ only if the cache (and thus dist/) was missing — self-heals
      # on eviction or an unreachable cache service on the self-hosted runner.
      - name: Build SDK (cache miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          bun install
          bun run build

      # Warm install: links example deps from the restored store and recreates
      # the createos-sandbox-sdk → dist/ symlink. No network on a cache hit.
      - name: Install example deps
        working-directory: examples
        run: bun install

      # example 20 needs python3-venv; install once since the job runs all examples
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # example 38 mounts an S3 bucket; play.min.io purges buckets periodically
      - name: Ensure S3 bucket (example 38)
        run: |
          curl -sSfL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc
          chmod +x /tmp/mc
          /tmp/mc alias set ci "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY"
          /tmp/mc mb --ignore-existing "ci/$S3_BUCKET"

      - name: Run examples (parallel, max 5)
        run: |
          mkdir -p /tmp/example-logs /tmp/example-fails
          mapfile -t EXAMPLES < <(echo "$EXAMPLES_JSON" | jq -r '.[]')

          printf '%s\n' "${EXAMPLES[@]}" | xargs -n1 -P5 bash -c '
            example="$1"
            log="/tmp/example-logs/$example.log"
            (cd "$GITHUB_WORKSPACE/examples/$example" && timeout 1200 bun index.ts) >"$log" 2>&1
            rc=$?
            [[ $rc -ne 0 ]] && echo "$rc" > "/tmp/example-fails/$example"
            printf "[%s] %s\n" "$([ $rc -eq 0 ] && echo "OK  " || echo "FAIL")" "$example"
            exit $rc
          ' _ || true

      - name: Report results
        if: always()
        run: |
          mapfile -t EXAMPLES < <(echo "$EXAMPLES_JSON" | jq -r '.[]')
          mapfile -t FAILED < <(ls /tmp/example-fails/ 2>/dev/null | sort)
          total=${#EXAMPLES[@]}
          nfailed=${#FAILED[@]}

          {
            echo "## Examples: $(( total - nfailed ))/${total} passed"
            echo ""
            echo "| Example | Result |"
            echo "| --- | --- |"
            for ex in "${EXAMPLES[@]}"; do
              if [[ -f "/tmp/example-fails/$ex" ]]; then
                echo "| \`$ex\` | ❌ |"
              else
                echo "| \`$ex\` | ✅ |"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ $nfailed -gt 0 ]]; then
            echo "::error::${nfailed} of ${total} example(s) failed: ${FAILED[*]}"
            for ex in "${FAILED[@]}"; do
              echo "::group::FAILED: $ex"
              cat "/tmp/example-logs/$ex.log" || true
              echo "::endgroup::"
            done
            exit 1
          fi
