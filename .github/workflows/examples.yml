name: examples

# Runs every example end-to-end against the live fc-spawn control plane.
# Each example is a one-shot `bun index.ts` that creates a sandbox, verifies
# it, and destroys it in a `finally` block — so a green job means the example
# worked against production.
#
# Cost note: every run spawns real microVMs and makes paid LLM API calls.
# Triggers are kept deliberate: nightly, manual, and on SDK source changes.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *" # nightly 03:17 UTC
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/examples.yml"
  pull_request:
    paths:
      - "src/**"
      - ".github/workflows/examples.yml"

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # checkout only; no write scope needed

jobs:
  # Build the example matrix from the examples/ directory so new examples are
  # picked up automatically — no edits to this file when one is added.
  # Discover also builds the SDK and installs example deps ONCE, seeding a
  # shared cache. The matrix jobs restore dist/ + examples/node_modules from
  # it instead of repeating `bun install` + `bun run build` 37 times.
  discover:
    runs-on: arc-runner-set
    outputs:
      examples: ${{ steps.list.outputs.examples }}
      cache-key: ${{ steps.key.outputs.key }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: list
        run: |
          json=$(cd examples && for d in [0-9]*/; do printf '%s\n' "${d%/}"; done \
            | grep . | grep -vE '^(10|36|37|38)-' | sed 's/.*/"&"/' | paste -sd, -)
          echo "examples=[$json]" >> "$GITHUB_OUTPUT"

      # Single source of truth for the cache key, consumed by the matrix jobs.
      # dist/ depends on src + tsconfig; examples/node_modules on its lockfile.
      - id: key
        run: |
          echo "key=examples-deps-${{ hashFiles('src/**', 'tsconfig.json', 'bun.lock', 'examples/bun.lock', 'examples/package.json') }}" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      # We cache the global bun store, NOT node_modules: examples depend on the
      # SDK via `file:../`, which bun materializes as a symlink back to the repo
      # root — a cycle that makes node_modules un-tar-able. The global store is
      # content-addressed and flat. Derive its path rather than hardcoding it.
      - id: buncache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      - id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.buncache.outputs.dir }}
            dist
          key: ${{ steps.key.outputs.key }}

      # On a cache miss, warm the global store (root + example deps) and build
      # dist/. cache@ saves both in its post step when the key was absent.
      - name: Build SDK + warm dependency cache
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          bun install
          bun run build
          cd examples && bun install

  run:
    needs: discover
    runs-on: arc-runner-set
    timeout-minutes: 20
    strategy:
      # No max-parallel: GitHub runs as many matrix jobs in parallel as the
      # runner pool allows (unlimited by request). The fc-spawn control plane
      # is the backstop that queues sandbox creation under load.
      fail-fast: false # one failing example must not cancel the others
      matrix:
        example: ${{ fromJson(needs.discover.outputs.examples) }}
    name: ${{ matrix.example }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - id: buncache
        run: echo "dir=$(bun pm cache)" >> "$GITHUB_OUTPUT"

      # Restore the global bun store + dist/ seeded by discover. node_modules is
      # NOT cached (the file:../ SDK symlink cycles); we relink it below with a
      # warm install that hits the restored store instead of the network.
      - id: cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.buncache.outputs.dir }}
            dist
          key: ${{ needs.discover.outputs.cache-key }}

      # Rebuild dist/ only if the cache (and thus dist/) was missing — self-heals
      # on eviction or an unreachable cache service on the self-hosted runner.
      - name: Build SDK (cache miss fallback)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          bun install
          bun run build

      # Warm install: links example deps from the restored store and recreates
      # the fc-sandbox-sdk → dist/ symlink. No network on a cache hit.
      - name: Install example deps
        working-directory: examples
        run: bun install

      # example 20 creates a Python venv on first run; setup-python ensures
      # venv support is present (plain python3 on Ubuntu lacks python3-venv).
      - name: Set up Python (google-adk example)
        if: matrix.example == '20-google-adk-agent'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Run ${{ matrix.example }}
        working-directory: examples/${{ matrix.example }}
        env:
          # --- fc-spawn control plane (read by the SDK + most examples) ---
          FC_API_KEY: ${{ secrets.FC_API_KEY }}
          FC_BASE_URL: ${{ secrets.FC_BASE_URL }}
          # --- OpenAI / OpenAI-compatible ---
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_URL: ${{ secrets.OPENAI_API_URL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          # OPENAI_USE_CHAT_COMPLETIONS: ${{ secrets.OPENAI_USE_CHAT_COMPLETIONS }}
          # OPENAI_AGENTS_DISABLE_TRACING: ${{ secrets.OPENAI_AGENTS_DISABLE_TRACING }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          # --- Anthropic ---
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          # --- third-party integrations (per-example) ---
          # BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          # BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          # FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          # FIRECRAWL_API_URL: ${{ secrets.FIRECRAWL_API_URL }}
          # OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          # SCRAPE_URL: ${{ secrets.SCRAPE_URL }}
          # --- S3-compatible bucket for example 38 (s3-disk-ffmpeg-transcode) ---
          # Wire these secrets, uncomment, and drop 38 from the discover
          # exclude list above to run that example end-to-end in CI. The bucket
          # must be reachable from the FC agent, not just the runner.
          # S3_BUCKET: ${{ secrets.S3_BUCKET }}
          # S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          # S3_REGION: ${{ secrets.S3_REGION }}
          # S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          # S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          # S3_USE_PATH_STYLE: ${{ secrets.S3_USE_PATH_STYLE }}
        run: bun index.ts
