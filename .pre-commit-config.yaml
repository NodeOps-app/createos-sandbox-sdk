# Pre-commit hooks for createos-sandbox-sdk (TypeScript SDK).
# Install: `pre-commit install`
# Run on all files: `pre-commit run --all-files`

repos:
  # ---------- generic ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: main
    hooks:
      # The whitespace fixers skip the generated docs (llms.txt, llms-full.txt,
      # examples/README.md): those are owned by `bun run docs:gen`, and letting
      # both rewrite them makes the two fight over the same lines.
      - id: trailing-whitespace
        exclude: '^(llms\.txt|llms-full\.txt|examples/README\.md)$'
      - id: end-of-file-fixer
        exclude: '^(llms\.txt|llms-full\.txt|examples/README\.md)$'
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        exclude: '^(llms\.txt|llms-full\.txt|examples/README\.md)$'

  - repo: https://github.com/gitleaks/gitleaks
    rev: master
    hooks:
      - id: gitleaks

  # ---------- TS / JS ----------
  # oxlint + oxfmt resolve from devDependencies via bunx.
  - repo: local
    hooks:
      - id: oxlint
        name: oxlint
        entry: bunx oxlint
        language: system
        files: '\.(ts|tsx|js|jsx|mjs|cjs)$'
      - id: oxfmt
        name: oxfmt
        entry: bunx oxfmt
        language: system
        files: '\.(ts|tsx|js|jsx|mjs|cjs|json)$'
      - id: typecheck
        name: tsc --noEmit
        entry: bunx tsc --noEmit
        language: system
        files: '\.(ts|tsx)$'
        pass_filenames: false
      - id: typecheck-tests
        name: tsc --noEmit (tests)
        entry: bunx tsc -p tsconfig.test.json
        language: system
        files: '\.(ts|tsx)$'
        pass_filenames: false
      - id: typecheck-examples
        name: tsc --noEmit (examples)
        entry: bunx tsc -p examples/tsconfig.json
        language: system
        files: '^examples/.*\.(ts|tsx)$'
        pass_filenames: false
      - id: test
        name: bun test (coverage-gated)
        entry: bun test tests/
        language: system
        files: '\.ts$'
        pass_filenames: false
      - id: docs-sync
        name: docs in sync with examples/manifest.json
        entry: bun scripts/gen-docs.mjs --check
        language: system
        files: '^(examples/manifest\.json|examples/README\.md|llms\.txt|llms-full\.txt|scripts/gen-docs\.mjs)$'
        pass_filenames: false
