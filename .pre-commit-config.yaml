# Pre-commit hooks for fc-sandbox-sdk (TypeScript SDK).
# Install: `pre-commit install`
# Run on all files: `pre-commit run --all-files`

repos:
  # ---------- generic ----------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: main
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/gitleaks/gitleaks
    rev: master
    hooks:
      - id: gitleaks

  # ---------- TS / JS ----------
  # oxlint + oxfmt resolve from devDependencies via bunx. Build + test
  # run in CI, not here — pre-commit stays fast.
  - repo: local
    hooks:
      - id: oxlint
        name: oxlint
        entry: bunx oxlint
        language: system
        files: '\.(ts|tsx|js|jsx|mjs|cjs)$'
      - id: oxfmt
        name: oxfmt
        entry: bunx oxfmt
        language: system
        files: '\.(ts|tsx|js|jsx|mjs|cjs|json)$'
      - id: typecheck
        name: tsc --noEmit
        entry: bunx tsc --noEmit
        language: system
        files: '\.(ts|tsx)$'
        pass_filenames: false
